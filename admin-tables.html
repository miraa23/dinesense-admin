        <div class="legend-item">

          <span class="legend-box occupied-box"></span>

    <div class="map-shell">
      <div class="live-seat-map">

</main>

<script type="module">

    onSnapshot,
    serverTimestamp

  const firebaseConfig = {
    apiKey: "AIzaSyCaNALWumkAiZp35XAQhA7IBovtKy8vO84",
    authDomain: "surayadinesense.firebaseapp.com",
    projectId: "surayadinesense",
    storageBucket: "surayadinesense.firebasestorage.app",
    messagingSenderId: "283332205556",
    appId: "1:283332205556:web:80e4c14db620e0258737a1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const COLLECTION_NAME = "tables";

  const tablePositions = [
    { id: "T01", seats: 6, shape: "rect-wide", top: 6.7, left: 39 },
    { id: "T02", seats: 4, shape: "rect-small", top: 6.7, left: 56.5 },

    { id: "T19", seats: 8, shape: "rect-wide", top: 25.5, left: 41.2 },
    { id: "T20", seats: 8, shape: "rect-wide", top: 25.5, left: 63.5 },

    { id: "T29", seats: 4, shape: "circle", top: 40.5, left: 13.5 },

    { id: "T34", seats: 4, shape: "circle", top: 46.8, left: 13.5 },

    { id: "T39", seats: 8, shape: "rect-wide", top: 50.0, left: 41.2 },

    { id: "T42", seats: 8, shape: "rect-wide-lower", top: 57.5, left: 41.2 },
    { id: "T43", seats: 8, shape: "rect-wide-lower", top: 57.5, left: 63.5 },
    { id: "T44", seats: 8, shape: "rect-wide-lower", top: 61.5, left: 41.2 },
    { id: "T45", seats: 8, shape: "rect-wide-lower", top: 61.5, left: 63.5 },
    { id: "T46", seats: 8, shape: "rect-wide-lower", top: 65.5, left: 41.2 },
    { id: "T47", seats: 8, shape: "rect-wide-lower", top: 69.6, left: 41.2 },
    { id: "T48", seats: 6, shape: "circle", top: 59.0, left: 93.0 }
  ];

  function normalizeStatus(status) {
    const s = String(status || "available").toLowerCase();

    if (s === "empty") return "available";
    if (s === "available") return "available";
    if (s === "reserved") return "booked";
    if (s === "booked") return "booked";
    if (s === "occupied") return "occupied";

    return "available";
  }

  function statusClass(status) {
    const s = normalizeStatus(status);

    if (s === "booked") return "status-booked";
    if (s === "occupied") return "status-occupied";

    return "status-available";
  }

  function nextStatus(status) {
    const s = normalizeStatus(status);

    if (s === "available") return "booked";
    if (s === "booked") return "occupied";

    return "available";
  }

  async function seedTablesIfMissing() {
    for (const table of tablePositions) {
      const ref = doc(db, COLLECTION_NAME, table.id);
      const snap = await getDoc(ref);

      if (snap.exists()) continue;

      await setDoc(ref, {
        label: table.id,
        seats: table.seats,
        status: "available",
        updatedAt: serverTimestamp()
      });
    }
  }

  async function updateTableStatus(tableId, status) {
    const table = tablePositions.find(t => t.id === tableId);

    await setDoc(
      doc(db, COLLECTION_NAME, tableId),
      {
        label: tableId,
        seats: table?.seats || 4,
        status: normalizeStatus(status),
        updatedAt: serverTimestamp()
      },
      { merge: true }
    );
  }

  function renderTableMapDirect(statusMap = {}) {
    const overlay = document.getElementById("tableOverlay");
    if (!overlay) return;

    const layoutItemsHTML = `
      <div class="food-booth booth-left"></div>
      <div class="food-booth booth-middle"></div>

      <div class="cashier cashier-small">cashier</div>
      <div class="cashier cashier-main">cashier</div>

      <div class="restaurant-entrance">entrance</div>
    `;

    const tablesHTML = tablePositions.map(table => {
      const status = normalizeStatus(statusMap[table.id] || "available");

      return `
        <button
          class="map-table ${table.shape} ${statusClass(status)}"
          style="top:${table.top}%; left:${table.left}%;"
          title="${table.id} - ${status}"
          type="button"
          data-table-id="${table.id}"
          data-status="${status}"
        >
          ${table.seats}
        </button>
      `;
    }).join("");

    overlay.innerHTML = layoutItemsHTML + tablesHTML;

overlay.querySelectorAll(".map-table").forEach(button => {
  button.addEventListener("click", async () => {
    const tableId = button.dataset.tableId;
    const currentStatus = normalizeStatus(button.dataset.status);

    // AVAILABLE → tiada action
    if (currentStatus === "available") {
      return;
    }

    // BOOKED → tidak boleh clear dari map
    if (currentStatus === "booked") {
      alert(
        `${tableId} is currently booked.\n\n` +
        `Please manage or cancel this booking from the Reservations page.`
      );
      return;
    }

    // OCCUPIED → boleh clear untuk walk-in
    if (currentStatus === "occupied") {
      const confirmed = confirm(
        `Are you sure you want to clear ${tableId}?\n\n` +
        `This will remove the occupied status and make the table available again.`
      );

      if (!confirmed) {
        return;
      }

      button.disabled = true;

      try {
        await updateTableStatus(tableId, "available");
      } catch (error) {
        console.error("Failed to clear occupied table:", error);
        alert("Failed to update table status. Please check Firebase.");
      } finally {
        button.disabled = false;
      }
    }
  });
});
  }

  async function startLiveTableMap() {
    const statusPill = document.getElementById("openStatus");

    try {
      if (statusPill) statusPill.textContent = "● Connecting Firebase";

      await seedTablesIfMissing();

      onSnapshot(
        collection(db, COLLECTION_NAME),
        (snapshot) => {
          const statusMap = {};

          snapshot.forEach((docSnap) => {
            statusMap[docSnap.id] = docSnap.data().status || "available";
          });

          renderTableMapDirect(statusMap);

          if (statusPill) {
            statusPill.textContent = "● Firebase Live";
            statusPill.classList.add("open");
          }
        },
        (error) => {
          console.error("Firestore listener error:", error);
          renderTableMapDirect({});

          if (statusPill) {
            statusPill.textContent = "● Firebase Error";
            statusPill.classList.remove("open");
          }
        }
      );
    } catch (error) {
      console.error("Firebase setup error:", error);
      renderTableMapDirect({});

      if (statusPill) {
        statusPill.textContent = "● Firebase Error";
        statusPill.classList.remove("open");
      }
    }
  }

  startLiveTableMap();
</script>

</body>
